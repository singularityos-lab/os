# Sinty OS Disk Image
#
#   GPT
#     p1  ESP (FAT)  -> /EFI/BOOT/BOOTX64.EFI = kernelcache.efi
#     p2  root       -> root.img (erofs + dm-verity hash)

image efi.vfat {
	vfat {
		label = "SINTYOS_ESP"
		file EFI/BOOT/BOOTX64.EFI {
			image = "singularity/kernelcache.efi"
		}
	}
	size = 32M
}

image singularity.img {
	hdimage {
		partition-table-type = "gpt"
	}
	partition esp {
		partition-type-uuid = "c12a7328-f81f-11d2-ba4b-00a0c93ec93b"
		image = "efi.vfat"
		bootable = "true"
	}
	partition root {
		partition-type-uuid = "4f68bce3-e8cd-4db1-96e7-fbcaf984b709"
		image = "singularity/root.img"
	}
}
